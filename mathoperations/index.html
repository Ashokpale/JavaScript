<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
          .result,.foutput {
            margin-top: 20px;
            font-size: 1.2em;
        }

        .foutput {
            font-family: monospace;
            background-color: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap; /* Preserve whitespace and formatting */
        }
</style>

<body>
    <h1>Data types , type conversions & prompt</h1>
    <p>task:</p>
    <p>Create a page in which you have to take input from user and then perform the maths operations</p>
    <hr>


    <div class="conatainer">
        <form id="math-operations">

            <div class="head-line" style="background-color: blueviolet; text-align: center;">
                <h3>Performing the maths operations</h3>
            </div>

            <div class="inpu1" style="margin-top: 20px; padding: 5px;">

                <label for="num1">Enter the first number:</label>
                <input type="number" id="num1" placeholder="e.g., 10"><br>
            </div>
            <div class="input2" style="margin-top: 20px; padding: 5px;">

                <label for="num2">Enter the second number:</label>
                <input type="number" id="num2" placeholder="e.g., 10"><br>
            </div>
            <div class="options" style="margin-top: 20px; padding: 5px;">

                <label for="output-operation">Select opration:</label>
                <select name="output-operation" id="operation">
                    <option value="addition">addtion</option>
                    <option value="subtraction">subtraction</option>
                    <option value="multiplication">multiplication</option>
                    <option value="division">division</option>
                </select><br>
            </div>
            <div class="btn" style="margin-top: 20px; padding: 5px;">
                <button onclick="performOperation()">Calcualte</button><br>
            </div>


            <div class="result" id="result">  </div>
            <div class="foutput" id="foutput"> </div>

        </form>
    </div>

    <!-- <script src="operators.js"></script> -->

    <script>

        function performOperation() {
            // Get input values
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operation = document.getElementById('operation').value;

            let result;
            let foutput;

            // Perform the selected operation
            switch (operation) {
                case 'addition':
                    result = num1 + num2;
                    foutput = `const num1 = ${num1};\nconst num2 = ${num2};\nconst result = num1 + num2;`;
                    break;
                case 'subtraction':
                    result = num1 - num2;
                    break;
                case 'multiplication':
                    result = num1 * num2;
                    break;
                case 'division':
                    if (num2 === 0) {
                        result = 'Division by zero is not allowed.';
                    } else {
                        result = num1 / num2;
                    }
                    break;
                default:
                    result = 'Invalid operation.';
            }

            // Display the result
            document.getElementById('result').textContent = `Result: ${result}`;
            document.getElementById('foutput').textContent = `OutputCode: n/${foutput}`;
        }

    </script>


</body>

</html>
