<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>

<body>

    <h2>To-Do List</h2>

    <!-- Input field and button to add new to-do items -->
    <input type="text" id="todoInput" placeholder="Enter a to-do item">
    <button id="addButton">Add</button>

    <!-- Container to display the to-do items -->
    <ul id="todoList"></ul>

    <script>
        // Select the input field, button, and the list container
        const todoInput = document.getElementById('todoInput');
        const addButton = document.getElementById('addButton');
        const todoList = document.getElementById('todoList');
       
        // Add a click event listener to the "Add" button
        addButton.addEventListener('click', function () {
            // Get the input value and trim any extra spaces
            const todoText = todoInput.value.trim();

            // If input is not empty, create a new list item
            if (todoText !== "") {
                // Create a new list item element
                const listItem = document.createElement('li');
            
    
                listItem.textContent = todoText; // Set the text of the list item

                // Append the list item to the to-do list container
                todoList.appendChild(listItem);

                // Clear the input field after adding the item
                todoInput.value = '';
            } else {
                alert("Please enter a to-do item.");
            }
        });
    </script>

</body>

</html>
