<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Data types , type conversions & prompt</h1>
    <p>task:</p>
    <p>Create a page in which you have to take input from user and then perform the maths operations</p>

    <p id="operators"></p>

    <script>

        //type conversions 
        //  1. num to string 
        let num = 25;
        let str = String(num);
        console.log(`converted number to string:  ${str}`);
        // 2.string to num

        let str1 = "25";
        let num1 = Number(str1);
        console.log(`converted string to number:  ${num1}`);

        // 3.converts num to Boolean

        let num2 = 1;
        //num2 = 0 --false
        let bool = Boolean(num2);
        console.log(`Converted num to boolean: ${bool}`);

        // different types of mathematical and logical computations

        // The Assignment Operator (=) assigns a value to a variable 

        let a = 5;
        let b = 5;
        let c = a + b;
        console.log(`${a} + ${b} = ${c}`);

        // addtion,substraction,multiplication, division

        let x = 5;  // Initial value
        let output = "Initial value of x: " + x + "<br>";

        x--;  // Decrement x
        output += "After decrement (x--), x: " + x + "<br>";

        let y = 10;  // Another variable
        output += "Initial value of y: " + y + "<br>";

        let z = x + y;  // Addition operation
        output += "x + y = " + z + "<br>";

        let w = z * 2;
        output += "z * 2 = " + w + "<br>";

        document.getElementById("operators").innerHTML = output;  // Display all results

        


    </script>
</body>


</html>
